<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de aprovisionamiento</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --border: #e8e5df;
    --border-strong: #d0ccc4;
    --text: #1a1916;
    --muted: #7a7670;
    --faint: #b5b0a8;

    --blue-bg: #eef4ff;
    --blue-border: #c2d5f8;
    --blue-text: #2253c7;

    --green-bg: #edfaf3;
    --green-border: #b8ecd2;
    --green-text: #1a6e43;

    --amber-bg: #fef9ec;
    --amber-border: #f5dfaa;
    --amber-text: #8a5e00;

    --red-bg: #fff0ef;
    --red-border: #f5c4c0;
    --red-text: #b52e28;

    --radius: 10px;
    --radius-sm: 6px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    padding: 28px 24px 40px;
    min-height: 100vh;
  }

  .top-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--faint);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  /* Step indicator */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    margin-bottom: 24px;
  }
  .step-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--faint);
  }
  .step-item.active { color: var(--text); }
  .step-item.done { color: var(--muted); }
  .step-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 500;
    background: var(--surface);
    color: var(--faint);
    flex-shrink: 0;
  }
  .step-item.active .step-num {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .step-item.done .step-num {
    background: var(--green-bg);
    border-color: var(--green-border);
    color: var(--green-text);
  }
  .step-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
    margin: 0 10px;
    min-width: 16px;
  }

  /* Question */
  .question {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 14px;
  }

  /* Option cards */
  .options { display: grid; gap: 8px; }
  .options-2 { grid-template-columns: 1fr 1fr; }
  .options-1 { grid-template-columns: 1fr; }

  .opt {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 13px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
    width: 100%;
    font-family: var(--font);
  }
  .opt:hover { border-color: var(--border-strong); background: #fafaf8; }
  .opt.selected {
    border-color: var(--blue-border);
    background: var(--blue-bg);
  }
  .opt-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .opt-text {}
  .opt-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .opt.selected .opt-title { color: var(--blue-text); }
  .opt-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .opt.selected .opt-sub { color: var(--blue-text); opacity: 0.7; }

  /* Result panel */
  .result-panel {
    display: none;
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
  }
  .result-panel.visible { display: block; }

  .result-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-header-icon { font-size: 20px; }
  .result-header-text {}
  .result-header-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .result-header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .result-body { padding: 16px 20px; }

  .result-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--blue-border);
    background: var(--blue-bg);
    color: var(--blue-text);
    cursor: pointer;
    transition: opacity 0.15s;
    text-decoration: none;
    margin-bottom: 18px;
  }
  .cta-btn:hover { opacity: 0.75; }
  .cta-arrow { font-size: 14px; }

  .meta-row {
    border-top: 1px solid var(--border);
    padding-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--muted);
  }
  .meta-chip .chip-label { color: var(--faint); margin-right: 2px; }

  .tip-box {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: var(--amber-bg);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--amber-text);
    line-height: 1.5;
    margin-top: 12px;
  }
  .tip-icon { flex-shrink: 0; font-size: 14px; margin-top: 1px; }

  /* Subsection for compound questions */
  .sub-question {
    margin-top: 20px;
    padding-top: 18px;
    border-top: 1px dashed var(--border);
  }
  .sub-question .question { font-size: 14px; }

  /* Reset */
  .reset-row {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .reset-btn {
    font-family: var(--font);
    font-size: 12px;
    color: var(--faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.15s;
  }
  .reset-btn:hover { color: var(--muted); }

  .hidden { display: none !important; }

  /* Sub-question branching */
  .sub-flow { display: none; }
  .sub-flow.visible { display: block; }

  @media (max-width: 480px) {
    .options-2 { grid-template-columns: 1fr; }
    body { padding: 20px 16px 32px; }
  }
</style>
</head>
<body>

<div class="top-label">Aprovisionamiento · Guía rápida</div>

<div class="steps">
  <div class="step-item active" id="step1-item">
    <div class="step-num">1</div>
    <span>¿Qué necesitas?</span>
  </div>
  <div class="step-divider"></div>
  <div class="step-item" id="step2-item">
    <div class="step-num">2</div>
    <span>Formulario</span>
  </div>
</div>

<div class="question">¿Qué tipo de solicitud necesitas hacer?</div>

<div class="options options-2" id="main-options">
  <button class="opt" onclick="selectMain('compras', this)">
    <span class="opt-icon">🛒</span>
    <div class="opt-text">
      <div class="opt-title">Compras</div>
      <div class="opt-sub">Componentes, activo fijo o servicios externos</div>
    </div>
  </button>
  <button class="opt" onclick="selectMain('transferencias', this)">
    <span class="opt-icon">🔄</span>
    <div class="opt-text">
      <div class="opt-title">Transferencias</div>
      <div class="opt-sub">El artículo ya está en almacén ERP</div>
    </div>
  </button>
  <button class="opt" onclick="selectMain('equipos', this)">
    <span class="opt-icon">🖥️</span>
    <div class="opt-text">
      <div class="opt-title">Equipos internos</div>
      <div class="opt-sub">Dispositivo Bitbrain de segunda mano</div>
    </div>
  </button>
  <button class="opt" onclick="selectMain('oficina', this)">
    <span class="opt-icon">📦</span>
    <div class="opt-text">
      <div class="opt-title">Oficina / viajes</div>
      <div class="opt-sub">Material de oficina o gestión de viajes</div>
    </div>
  </button>
</div>

<!-- Sub-question for Compras: ¿hay stock? -->
<div class="sub-flow" id="sub-compras">
  <div class="sub-question">
    <div class="question">¿Sabes si el artículo ya tiene stock en el almacén ERP?</div>
    <div class="options options-2">
      <button class="opt" onclick="selectSub('compras-si', this)">
        <span class="opt-icon">✅</span>
        <div class="opt-text">
          <div class="opt-title">Sí, hay stock</div>
          <div class="opt-sub">El artículo existe en el ERP</div>
        </div>
      </button>
      <button class="opt" onclick="selectSub('compras-no', this)">
        <span class="opt-icon">🔍</span>
        <div class="opt-text">
          <div class="opt-title">No hay stock / no sé</div>
          <div class="opt-sub">Hay que hacer pedido externo</div>
        </div>
      </button>
    </div>
  </div>
</div>

<!-- Results -->
<div class="result-panel" id="result-panel">
  <div class="result-header">
    <span class="result-header-icon" id="r-icon">🛒</span>
    <div class="result-header-text">
      <div class="result-header-title" id="r-title">Formulario de Compras</div>
      <div class="result-header-sub" id="r-subtitle">Paso 2 de 2</div>
    </div>
  </div>
  <div class="result-body">
    <p class="result-desc" id="r-desc"></p>
    <a class="cta-btn" id="r-cta" href="#" target="_blank">
      <span id="r-cta-label">Ir al formulario</span>
      <span class="cta-arrow">↗</span>
    </a>
    <div class="meta-row" id="r-meta"></div>
    <div class="tip-box" id="r-tip" style="display:none">
      <span class="tip-icon">💡</span>
      <span id="r-tip-text"></span>
    </div>
  </div>
</div>

<div class="reset-row" id="reset-row" style="display:none">
  <button class="reset-btn" onclick="resetAll()">
    ↺ Volver a empezar
  </button>
</div>

<script>
const flows = {
  'compras-no': {
    icon: '🛒',
    title: 'Formulario de Compras',
    subtitle: 'Pedido externo',
    desc: 'Usa este formulario para adquirir componentes, fungibles, materia prima, activo fijo (maquinaria, herramientas, mobiliario) o contratar servicios externos como consultoría o subcontratación.',
    cta: 'Ir al formulario de Compras',
    url: '#',
    meta: [
      { label: 'Gestiona', value: 'Dpto. Compras' },
      { label: 'Aprueba', value: 'Dirección / Producción' },
    ],
    tip: null
  },
  'compras-si': {
    icon: '🔄',
    title: 'Formulario de Transferencias',
    subtitle: 'Hay stock disponible en ERP',
    desc: 'El artículo que necesitas ya está en el almacén de Producción. No es necesario hacer un pedido externo — solo hay que mover el stock internamente.',
    cta: 'Ir al formulario de Transferencias',
    url: '#',
    meta: [
      { label: 'Gestiona', value: 'Producción / Compras' },
      { label: 'Aprueba', value: 'Producción / Compras' },
    ],
    tip: 'Si tienes dudas sobre la referencia exacta, consulta con Dpto. Producción antes de enviar el formulario.'
  },
  'transferencias': {
    icon: '🔄',
    title: 'Formulario de Transferencias',
    subtitle: 'Stock en almacén ERP',
    desc: 'El artículo que necesitas ya está disponible en el almacén de Producción (ERP). Usa este formulario para mover el stock internamente sin hacer un pedido externo.',
    cta: 'Ir al formulario de Transferencias',
    url: '#',
    meta: [
      { label: 'Gestiona', value: 'Producción / Compras' },
      { label: 'Aprueba', value: 'Producción / Compras' },
    ],
    tip: null
  },
  'equipos': {
    icon: '🖥️',
    title: 'Formulario de Equipos internos',
    subtitle: 'Stock interno Soporte',
    desc: 'Para solicitar un dispositivo Bitbrain de segunda mano del stock interno de Soporte. Aplica a cualquier empleado o departamento.',
    cta: 'Ir al formulario de Equipos internos',
    url: '#',
    meta: [
      { label: 'Gestiona', value: 'Soporte (Personas)' },
      { label: 'Stock', value: 'Almacén interno Soporte' },
    ],
    tip: 'Si no hay stock disponible, Soporte te derivará al formulario de Compras para adquirir un dispositivo nuevo.'
  },
  'oficina': {
    icon: '📦',
    title: 'Contactar con Daniela',
    subtitle: 'Material de oficina y viajes',
    desc: 'Para material de oficina, papelería u otros fungibles de uso general, y para gestión de viajes (billetes, alojamiento, reservas).',
    cta: 'Escribir a Daniela',
    url: '#',
    meta: [
      { label: 'Gestiona', value: 'Daniela' },
    ],
    tip: 'Este canal es solo para material de oficina y viajes. Para material técnico o activo fijo, usa el formulario de Compras.'
  }
};

let currentMain = null;

function selectMain(id, el) {
  document.querySelectorAll('#main-options .opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  currentMain = id;

  // Hide all sub-flows
  document.querySelectorAll('.sub-flow').forEach(s => s.classList.remove('visible'));
  // Reset sub-question selections
  document.querySelectorAll('.sub-flow .opt').forEach(o => o.classList.remove('selected'));

  document.getElementById('result-panel').classList.remove('visible');
  document.getElementById('reset-row').style.display = 'none';

  if (id === 'compras') {
    document.getElementById('sub-compras').classList.add('visible');
    setStep(1);
  } else {
    showResult(id);
  }
}

function selectSub(id, el) {
  // Only clear siblings in same sub-flow
  el.closest('.options').querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  showResult(id);
}

function showResult(id) {
  const d = flows[id];
  if (!d) return;

  document.getElementById('r-icon').textContent = d.icon;
  document.getElementById('r-title').textContent = d.title;
  document.getElementById('r-subtitle').textContent = d.subtitle;
  document.getElementById('r-desc').textContent = d.desc;
  document.getElementById('r-cta-label').textContent = d.cta;
  document.getElementById('r-cta').href = d.url;

  const metaEl = document.getElementById('r-meta');
  metaEl.innerHTML = d.meta.map(m =>
    `<span class="meta-chip"><span class="chip-label">${m.label}</span>${m.value}</span>`
  ).join('');

  const tipEl = document.getElementById('r-tip');
  const tipText = document.getElementById('r-tip-text');
  if (d.tip) {
    tipText.textContent = d.tip;
    tipEl.style.display = 'flex';
  } else {
    tipEl.style.display = 'none';
  }

  document.getElementById('result-panel').classList.add('visible');
  document.getElementById('reset-row').style.display = 'flex';
  setStep(2);
}

function setStep(n) {
  const s1 = document.getElementById('step1-item');
  const s2 = document.getElementById('step2-item');
  if (n === 1) {
    s1.className = 'step-item active';
    s2.className = 'step-item';
    s2.querySelector('.step-num').textContent = '2';
  } else {
    s1.className = 'step-item done';
    s1.querySelector('.step-num').innerHTML = '✓';
    s2.className = 'step-item active';
    s2.querySelector('.step-num').textContent = '2';
  }
}

function resetAll() {
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.sub-flow').forEach(s => s.classList.remove('visible'));
  document.getElementById('result-panel').classList.remove('visible');
  document.getElementById('reset-row').style.display = 'none';
  currentMain = null;

  const s1 = document.getElementById('step1-item');
  const s2 = document.getElementById('step2-item');
  s1.className = 'step-item active';
  s1.querySelector('.step-num').textContent = '1';
  s2.className = 'step-item';
  s2.querySelector('.step-num').textContent = '2';
}
</script>
</body>
</html>
